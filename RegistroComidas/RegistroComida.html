    <main>
        <section class="registro-section" id="registro-section">

            <h2 class="registro-titulo">Registrar Comida</h2>

            <form class="registro-form" id="registroForm">

                <div class="registro-campo">
                    <label>Nombre del alimento</label>
                    <input type="text" id="reg-nombre" placeholder="Ej: Arroz con pollo" required />
                </div>

                <div class="registro-campo">
                    <label>Tipo de comida</label>
                    <select id="reg-tipo">
                        <option value="Desayuno">🌅 Desayuno</option>
                        <option value="Almuerzo">☀️ Almuerzo</option>
                        <option value="Merienda">🍎 Merienda</option>
                        <option value="Cena">🌙 Cena</option>
                    </select>
                </div>

                <div class="registro-fila">
                    <div class="registro-campo">
                        <label>Calorías (kcal)</label>
                        <input type="number" id="reg-calorias" placeholder="0" min="0" />
                    </div>
                    <div class="registro-campo">
                        <label>Proteínas (g)</label>
                        <input type="number" id="reg-proteinas" placeholder="0" min="0" />
                    </div>
                    <div class="registro-campo">
                        <label>Carbohidratos (g)</label>
                        <input type="number" id="reg-carbos" placeholder="0" min="0" />
                    </div>
                    <div class="registro-campo">
                        <label>Grasas (g)</label>
                        <input type="number" id="reg-grasas" placeholder="0" min="0" />
                    </div>
                </div>

                <button type="submit" class="registro-btn">Guardar comida</button>

            </form>

            <!-- Lista de comidas guardadas -->
            <div class="registro-lista" id="registro-lista"></div>

        </section>
    </main>

    <script src="../js/registroComida.js"></script>

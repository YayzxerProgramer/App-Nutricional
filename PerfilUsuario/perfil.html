<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - App Nutricional</title>
</head>

<body>=

    <main>

        <h1>Mi Perfil</h1>

        <!-- Datos personales -->
        <section>
            <h2>Información personal</h2>

            <p><strong>Nombre:</strong> <span id="perfil-nombre">—</span></p>
            <p><strong>Usuario:</strong> <span id="perfil-usuario">—</span></p>
            <p><strong>Correo:</strong> <span id="perfil-correo">—</span></p>
            <p><strong>Meta:</strong> <span id="perfil-meta">—</span></p>
        </section>

        <!-- Stats físicos -->
        <section>
            <h2>Datos físicos</h2>

            <p><strong>Edad:</strong> <span id="stat-edad">—</span></p>
            <p><strong>Altura:</strong> <span id="stat-altura">—</span></p>
            <p><strong>Peso:</strong> <span id="stat-peso">—</span></p>
            <p><strong>IMC:</strong> <span id="stat-imc">—</span> — <span id="stat-imc-estado">—</span></p>
        </section>

        <!-- Nutrición del día -->
        <section>
            <h2>Nutrición de hoy</h2>

            <p><strong>Calorías:</strong> <span id="nut-calorias">0</span></p>
            <p><strong>Proteínas:</strong> <span id="nut-proteinas">0g</span></p>
            <p><strong>Carbohidratos:</strong> <span id="nut-carbos">0g</span></p>
            <p><strong>Grasas:</strong> <span id="nut-grasas">0g</span></p>
        </section>

        <!-- Gestión de cuenta -->
        <section>
            <h2>Gestión de cuenta</h2>

            <p><strong>Correo:</strong> <span id="perfil-correo-2">—</span></p>

            <br>

            <button id="btn-editar">Editar perfil</button>
            <button id="btn-guardar" class="oculto">Guardar cambios</button>
            <button id="btn-logout">Cerrar sesión</button>
        </section>

        <!-- Formulario de edición -->
        <section id="form-edicion" class="oculto">
            <h2>Editar información</h2>

            <p>
                <label for="edit-nombre">Nombre:</label><br>
                <input type="text" id="edit-nombre" disabled>
            </p>

            <p>
                <label for="edit-apellido">Apellido:</label><br>
                <input type="text" id="edit-apellido" disabled>
            </p>

            <p>
                <label for="edit-correo">Correo:</label><br>
                <input type="email" id="edit-correo" disabled>
            </p>

            <p>
                <label for="edit-edad">Edad:</label><br>
                <input type="number" id="edit-edad" disabled>
            </p>

            <p>
                <label for="edit-altura">Altura (cm):</label><br>
                <input type="number" id="edit-altura" disabled>
            </p>

            <p>
                <label for="edit-peso">Peso (kg):</label><br>
                <input type="number" step="0.1" id="edit-peso" disabled>
            </p>

            <p>
                <label for="edit-meta">Meta de salud:</label><br>
                <input type="text" id="edit-meta" disabled>
            </p>
        </section>

        <!-- Notificación simple -->
        <p id="toast"></p>

    </main>

    <script type="module" src="../js/perfil.js"></script>

</body>

</html>
